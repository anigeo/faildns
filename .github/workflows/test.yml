name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container: debian:12-slim

    steps:
      - name: Install runtime and build tools
        run: |
          apt-get update
          apt-get install -y ca-certificates git make python3 python3-dnspython

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run checks
        run: make check
